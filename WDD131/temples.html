<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album - WDD131">
    <meta name="author" content="Nelida Colque Salas">

    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>

</head>

<body>

    <header>
    
        <p class="logo">Temple Album</p>
    
        <button id="menu" aria-label="Open navigation menu"></button>
    
        <nav class="navigation" aria-label="Main Navigation">
    
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
    
        </nav>

    </header>

    <main>

        <h1>Temple Album</h1>

        <div class="gallery">

            <figure>
                <img src="images/arequipa.webp" alt="Arequipa Temple" loading="lazy">
                <figcaption>Arequipa Perú</figcaption>
            </figure>

            <figure>
                <img src="images/lima.webp" alt="Lima Temple" loading="lazy">
                <figcaption>Lima Perú</figcaption>
            </figure>

            <figure>
                <img src="images/trujillo.webp" alt="Trujillo Temple" loading="lazy">
                <figcaption>Trujillo Perú</figcaption>
            </figure>

            <figure>
                <img src="images/cusco.webp" alt="Cusco Temple" loading="lazy">
                <figcaption>Cusco Perú</figcaption>
            </figure>

            <figure>
                <img src="images/saltlake.webp" alt="Salt Lake Temple" loading="lazy">
                <figcaption>Salt Lake City</figcaption>
            </figure>

            <figure>
                <img src="images/sandiego.webp" alt="San Diego Temple" loading="lazy">
                <figcaption>San Diego California</figcaption>
            </figure>

            <figure>
                <img src="images/rome.webp" alt="Rome Temple" loading="lazy">
                <figcaption>Rome Italy</figcaption>
            </figure>

            <figure>
                <img src="images/tokyo.webp" alt="Tokyo Temple" loading="lazy">
                <figcaption>Tokyo Japan</figcaption>
            </figure>

            <figure>
                <img src="images/manila.webp" alt="Manila Temple" loading="lazy">
                <figcaption>Manila Philippines</figcaption>
            </figure>

        </div>

    </main>

    <footer>

        <p>
            © <span id="year"></span>
            🌸 Nelida Colque Salas 🌸
            Arequipa, Perú
        </p>

        <p id="lastModified"></p>

    </footer>

</body>

</html>
